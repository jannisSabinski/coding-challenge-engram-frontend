<nav class="grid grid-cols-3 items-center px-8 py-1 bg-gray-100">
  <div></div>

  <div class="flex justify-center gap-2.5">
    <a
      class="navElement"
      routerLink="/"
      routerLinkActive="border-2 border-gray-500 bg-gray-200"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <svg lucideCompass class="mr-1"></svg>
      <span>Discover</span>
    </a>
    @if (isLoggedIn) {
      <a
        class="navElement"
        routerLink="/my-images"
        routerLinkActive="border-2 border-gray-500 bg-gray-200"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg lucideBookImage class="mr-1"></svg>
        <span>My Images</span>
      </a>
    }
  </div>

  <div class="flex justify-end">
    <a
      class="navElement"
      [routerLink]="isLoggedIn ? '/account/settings' : '/account/login'"
      routerLinkActive="border-2 border-gray-500 bg-gray-200"
    >
      <svg lucideCircleUserRound class="mr-1"></svg>
      <span>{{ isLoggedIn ? 'Account' : 'Login/Signup' }}</span>
    </a>
  </div>
</nav>
